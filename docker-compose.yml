services:
  omnibrain-api:
    build: .
    container_name: omnibrain-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Mapeo de variables sensibles (se recomienda usar un .env real)
      - LOCAL_API_KEY=${LOCAL_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - DATABASE_URL=./data/api.db
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
